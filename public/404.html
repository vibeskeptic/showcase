<!doctype html>
<html>
  <head>
    <script>
      // Redirect GitHub Pages 404s back to the SPA with the path encoded as a query param
      var path = window.location.pathname + window.location.search
      window.location.replace('/?p=' + encodeURIComponent(path) + window.location.hash)
    </script>
  </head>
</html>
